# Alembic configuration — async template.
# NOTE: sqlalchemy.url is intentionally left blank. The URL is injected from
# app.core.settings.DATABASE_URL inside alembic/env.py so Compose / timeweb env wins
# (RESEARCH: do not hardcode the DB URL in alembic.ini).

[alembic]
script_location = alembic
prepend_sys_path = .
# Use OS path separators and a UTC, sortable revision filename prefix.
path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

sqlalchemy.url =

[post_write_hooks]
# Format newly generated migration files with ruff.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
