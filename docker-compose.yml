# Зеркало Судьбы — local dev stack (mirrors the timeweb.cloud deploy shape).
# `docker compose up` brings up postgres:16 + redis:7 + the FastAPI backend together,
# with healthcheck-gated ordering so the backend only starts once its deps are ready.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zerkalo
      POSTGRES_PASSWORD: zerkalo
      POSTGRES_DB: zerkalo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerkalo -d zerkalo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      # Service-name DSNs override any host-oriented values in .env so the container
      # reaches its peers on the compose network.
      DATABASE_URL: postgresql+asyncpg://zerkalo:zerkalo@postgres:5432/zerkalo
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
