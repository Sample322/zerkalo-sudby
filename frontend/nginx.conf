# Static SPA serving for the Зеркало Судьбы Mini App.
# The frontend is a client-rendered SPA — every non-asset path must fall back to index.html
# so client routing (FlowRoot step machine) works on hard refresh / deep links.
# The backend lives on a SEPARATE origin (VITE_API_BASE) and is reached via cross-origin
# fetch with a Bearer JWT — there is no /api proxy here; CORS on the backend authorizes it.

server {
    # timeweb App Platform reserves ports 80/443 — the web container listens on 8080.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    # CRITICAL on timeweb App Platform: the public edge reverse-proxies requests into this
    # container, so nginx sees them as "proxied". Without gzip_proxied the default is OFF →
    # the 363KB JS bundle is served UNCOMPRESSED to the edge (and on to the client). On a
    # throttled/DPI'd network the uncompressed bundle times out → blank Mini App. `any` makes
    # nginx gzip regardless of proxy headers → ~114KB.
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css text/javascript application/javascript application/json image/svg+xml;

    # Hashed build assets — safe to cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: serve index.html for any unmatched route (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Minimal hardening. NOTE: no X-Frame-Options / restrictive CSP here on purpose —
    # the app runs inside the Telegram WebView; a strict frame/CSP policy can break the
    # Telegram WebApp SDK. Tighten with a nonce-based CSP before PUBLIC launch (web/security).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
